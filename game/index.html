<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TSB Real EXE Loader</title>

<style>
html,body{
    margin:0;
    padding:0;
    background:#111;
    color:#fff;
    font-family:Arial,Helvetica,sans-serif;
    overflow:hidden;
}
#topbar{
    height:48px;
    background:#1d1d1d;
    border-bottom:2px solid #333;
    display:flex;
    align-items:center;
    gap:12px;
    padding:0 14px;
}
#title{
    color:#7dff7d;
    font-weight:bold;
}
button{
    background:#2d2d2d;
    color:#fff;
    border:1px solid #555;
    padding:7px 12px;
    cursor:pointer;
}
button:hover{
    background:#3a3a3a;
}
#status{
    margin-left:auto;
    color:#aaa;
    font-size:14px;
}
#wrap{
    width:100vw;
    height:calc(100vh - 48px);
    display:flex;
    justify-content:center;
    align-items:center;
}
canvas{
    width:960px;
    height:720px;
    max-width:95vw;
    max-height:90vh;
    background:#000;
    border:2px solid #333;
    image-rendering:pixelated;
}
</style>
</head>
<body>

<div id="topbar">
    <div id="title">Toad Strikes Back — Real EXE Loader</div>
    <button onclick="boot()">Boot</button>
    <button onclick="location.href='/help'">Help</button>
    <div id="status">Idle</div>
</div>

<div id="wrap">
    <canvas id="game" width="640" height="480"></canvas>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const statusEl = document.getElementById("status");

function status(t){
    statusEl.textContent = t;
}

function clear(){
    ctx.fillStyle="#000";
    ctx.fillRect(0,0,640,480);
}

function line(txt,y,color="#fff",size=18){
    ctx.fillStyle=color;
    ctx.font=size+"px Consolas";
    ctx.fillText(txt,20,y);
}

function center(txt,y,color="#fff",size=24){
    ctx.fillStyle=color;
    ctx.font=size+"px Arial";
    ctx.textAlign="center";
    ctx.fillText(txt,320,y);
    ctx.textAlign="left";
}

async function boot(){
    clear();
    status("Downloading EXE...");

    try{
        const exeRes = await fetch("https://tsb-web-port.vercel.app/game/TSB.exe");
        const exeBuf = await exeRes.arrayBuffer();

        const dllRes = await fetch("https://tsb-web-port.vercel.app/game/Cncs232.dll");
        const dllBuf = await dllRes.arrayBuffer();

        inspectPE(exeBuf,dllBuf);

    }catch(e){
        console.error(e);
        status("Load failed");
        clear();
        center("FAILED TO LOAD FILES",240,"#f55",28);
    }
}

function inspectPE(exeBuf,dllBuf){
    clear();

    const dv = new DataView(exeBuf);

    let y = 30;

    line("TSB.exe loaded: " + exeBuf.byteLength + " bytes", y); y+=28;
    line("Cncs232.dll loaded: " + dllBuf.byteLength + " bytes", y); y+=28;
    y+=10;

    status("Inspecting EXE");

    const mz1 = dv.getUint8(0);
    const mz2 = dv.getUint8(1);
    const sig = String.fromCharCode(mz1,mz2);

    line("DOS Signature: " + sig, y, "#7dff7d"); y+=28;

    if(sig !== "MZ"){
        line("Not a valid EXE", y, "#f55");
        return;
    }

    const peOffset = dv.getUint32(0x3C, true);
    line("PE Header Offset: 0x" + peOffset.toString(16).toUpperCase(), y); y+=28;

    const peSig =
        String.fromCharCode(
            dv.getUint8(peOffset),
            dv.getUint8(peOffset+1),
            dv.getUint8(peOffset+2),
            dv.getUint8(peOffset+3)
        ).replace(/\0/g,"");

    line("PE Signature: " + peSig, y, "#7dff7d"); y+=28;

    const machine = dv.getUint16(peOffset+4, true);

    let machineText="Unknown";
    if(machine===0x14c) machineText="x86 (32-bit)";
    if(machine===0x8664) machineText="x64";

    line("Machine: " + machineText, y); y+=28;

    const sections = dv.getUint16(peOffset+6, true);
    line("Sections: " + sections, y); y+=28;

    const optSize = dv.getUint16(peOffset+20, true);
    line("Optional Header Size: " + optSize, y); y+=28;

    const entry = dv.getUint32(peOffset+40, true);
    line("Entry Point RVA: 0x" + entry.toString(16).toUpperCase(), y, "#ffaa33"); y+=28;

    y+=12;
    line("Sections:", y, "#7dff7d"); y+=26;

    const secStart = peOffset + 24 + optSize;

    for(let i=0;i<sections;i++){
        const off = secStart + i*40;

        let name="";
        for(let j=0;j<8;j++){
            const c = dv.getUint8(off+j);
            if(c!==0) name += String.fromCharCode(c);
        }

        const vsize = dv.getUint32(off+8, true);
        const rva   = dv.getUint32(off+12, true);

        line(
            name.padEnd(8," ") +
            " RVA 0x" + rva.toString(16).toUpperCase() +
            " Size " + vsize,
            y
        );
        y+=22;

        if(y > 430) break;
    }

    y+=10;
    center("REAL FILE OPENED + PARSED",450,"#00ff00",22);

    status("EXE parsed successfully");
}
</script>

</body>
</html>
