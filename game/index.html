<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Toad Strikes Back Web Port</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    background: #111;
    color: white;
    font-family: Arial, Helvetica, sans-serif;
    overflow: hidden;
}

#topbar {
    height: 48px;
    background: #1d1d1d;
    border-bottom: 2px solid #333;
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 12px;
}

#title {
    font-weight: bold;
    color: #7dff7d;
}

button {
    background: #2d2d2d;
    color: white;
    border: 1px solid #555;
    padding: 7px 12px;
    cursor: pointer;
}

button:hover {
    background: #3a3a3a;
}

#status {
    margin-left: auto;
    color: #aaa;
    font-size: 14px;
}

#gameWrap {
    width: 100vw;
    height: calc(100vh - 48px);
    display: flex;
    justify-content: center;
    align-items: center;
}

canvas {
    width: 960px;
    height: 720px;
    max-width: 95vw;
    max-height: 90vh;
    background: black;
    border: 2px solid #333;
    image-rendering: pixelated;
}
</style>
</head>
<body>

<div id="topbar">
    <div id="title">Toad Strikes Back — Web Runtime Prototype</div>
    <button onclick="bootGame()">Boot</button>
    <button onclick="location.href='/help'">Help</button>
    <div id="status">Idle</div>
</div>

<div id="gameWrap">
    <canvas id="game" width="640" height="480"></canvas>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const statusEl = document.getElementById("status");

let exeBuffer = null;
let dllBuffer = null;
let booting = false;

function status(text){
    statusEl.textContent = text;
}

async function bootGame(){
    if(booting) return;
    booting = true;

    status("Downloading game files...");

    try{
        const exeRes = await fetch("./TSB.exe");
        exeBuffer = await exeRes.arrayBuffer();

        const dllRes = await fetch("./Cncs232.dll");
        dllBuffer = await dllRes.arrayBuffer();

        status("Files loaded");

        await showMFGG();
        await showDisclaimer();
        await showTitle();

        status("Title screen ready");

    }catch(err){
        console.error(err);
        status("Boot failed");
    }

    booting = false;
}

function clear(){
    ctx.fillStyle = "black";
    ctx.fillRect(0,0,640,480);
}

function sleep(ms){
    return new Promise(r => setTimeout(r, ms));
}

async function fadeText(lines, color="#fff", time=2200){
    const start = performance.now();

    return new Promise(resolve=>{
        function frame(now){
            let t = (now - start) / 500;
            let alpha = Math.min(1, t);

            if(now - start > time - 500){
                alpha = Math.max(0, (time - (now-start)) / 500);
            }

            clear();

            ctx.globalAlpha = alpha;
            ctx.fillStyle = color;
            ctx.textAlign = "center";

            for(let i=0;i<lines.length;i++){
                ctx.font = i===0 ? "bold 42px Arial" : "22px Arial";
                ctx.fillText(lines[i], 320, 180 + i*42);
            }

            ctx.globalAlpha = 1;

            if(now - start < time){
                requestAnimationFrame(frame);
            }else{
                resolve();
            }
        }
        requestAnimationFrame(frame);
    });
}

async function showMFGG(){
    status("Showing MFGG logo");
    await fadeText([
        "MFGG"
    ], "#ffaa33", 2600);
}

async function showDisclaimer(){
    status("Showing freeware notice");
    await fadeText([
        "FREEWARE",
        "This fan-made game is not affiliated",
        "with Nintendo."
    ], "#ffffff", 3600);
}

let titleBlink = true;

async function showTitle(){
    status("Loading title screen");

    function draw(){
        clear();

        // sky
        ctx.fillStyle = "#5aa9ff";
        ctx.fillRect(0,0,640,480);

        // hills
        ctx.fillStyle = "#4cae50";
        ctx.beginPath();
        ctx.arc(120,420,140,Math.PI,0);
        ctx.fill();

        ctx.beginPath();
        ctx.arc(500,430,160,Math.PI,0);
        ctx.fill();

        // ground
        ctx.fillStyle = "#8a4f20";
        ctx.fillRect(0,400,640,80);

        ctx.fillStyle = "#2c9d2c";
        ctx.fillRect(0,390,640,12);

        // title
        ctx.fillStyle = "#fff";
        ctx.textAlign = "center";
        ctx.font = "bold 54px Arial";
        ctx.fillText("TOAD STRIKES BACK", 320, 145);

        ctx.font = "22px Arial";
        ctx.fillText("WEB PORT", 320, 185);

        if(titleBlink){
            ctx.font = "24px Arial";
            ctx.fillText("PRESS ANY KEY", 320, 315);
        }

        ctx.font = "16px Arial";
        ctx.fillText("Original EXE + DLL Loaded", 320, 455);
    }

    draw();

    setInterval(()=>{
        titleBlink = !titleBlink;
        draw();
    }, 500);

    window.onkeydown = ()=>{
        status("Game start pending runtime");
    };
}
</script>

</body>
</html>
