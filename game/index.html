<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TSB Web Port</title>

<style>
html,body{
margin:0;
padding:0;
background:#000;
overflow:hidden;
height:100%;
font-family:Arial,Helvetica,sans-serif;
}
#screen{
width:100vw;
height:100vh;
display:block;
background:#000;
}
#ui{
position:fixed;
top:10px;
left:10px;
z-index:5;
color:#fff;
}
button{
padding:8px 12px;
margin-right:6px;
font-size:14px;
cursor:pointer;
}
#status{
margin-top:8px;
font-size:14px;
color:#7dff7d;
}
</style>
</head>
<body>

<div id="ui">
<button onclick="launch()">Launch TSB</button>
<button onclick="fullscreen()">Fullscreen</button>
<div id="status">Ready</div>
</div>

<canvas id="screen"></canvas>

<script src="https://tsb-web-port.vercel.app/runtime/boxedwine.js"></script>

<script>
let Module;

function setStatus(t){
document.getElementById("status").textContent=t;
}

async function launch(){

setStatus("Starting runtime...");

Module = await BoxedWine({
canvas: document.getElementById("screen")
});

setStatus("Creating drive...");

try{Module.FS.mkdir('/C');}catch(e){}
try{Module.FS.mkdir('/C/TSB');}catch(e){}

async function copy(url,name){
const r = await fetch(url);
const b = await r.arrayBuffer();
Module.FS.writeFile('/C/TSB/'+name,new Uint8Array(b));
}

setStatus("Copying game files...");

await copy(
'https://tsb-web-port.vercel.app/game/TSB.exe',
'TSB.exe'
);

await copy(
'https://tsb-web-port.vercel.app/game/Cncs232.dll',
'Cncs232.dll'
);

try{
await copy(
'https://tsb-web-port.vercel.app/game/tsb_data',
'tsb_data'
);
}catch(e){}

try{
await copy(
'https://tsb-web-port.vercel.app/game/tsb_data2',
'tsb_data2'
);
}catch(e){}

try{
await copy(
'https://tsb-web-port.vercel.app/game/tsb_data3',
'tsb_data3'
);
}catch(e){}

setStatus("Launching TSB.exe...");

Module.callMain([
'C:\\TSB\\TSB.exe'
]);

setStatus("TSB running");

}

function fullscreen(){
document.body.requestFullscreen();
}
</script>

</body>
</html>
