<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TSB Import Scanner</title>

<style>
html,body{
    margin:0;
    padding:0;
    background:#111;
    color:#fff;
    font-family:Arial,Helvetica,sans-serif;
    overflow:hidden;
}
#topbar{
    height:48px;
    background:#1d1d1d;
    border-bottom:2px solid #333;
    display:flex;
    align-items:center;
    gap:12px;
    padding:0 14px;
}
#title{
    color:#7dff7d;
    font-weight:bold;
}
button{
    background:#2d2d2d;
    color:#fff;
    border:1px solid #555;
    padding:7px 12px;
    cursor:pointer;
}
button:hover{
    background:#3a3a3a;
}
#status{
    margin-left:auto;
    color:#aaa;
    font-size:14px;
}
#wrap{
    width:100vw;
    height:calc(100vh - 48px);
    display:flex;
    justify-content:center;
    align-items:center;
}
canvas{
    width:960px;
    height:720px;
    max-width:95vw;
    max-height:90vh;
    background:#000;
    border:2px solid #333;
    image-rendering:pixelated;
}
</style>
</head>
<body>

<div id="topbar">
    <div id="title">Toad Strikes Back — Import Scanner</div>
    <button onclick="boot()">Boot</button>
    <button onclick="location.href='/help'">Help</button>
    <div id="status">Idle</div>
</div>

<div id="wrap">
    <canvas id="game" width="640" height="480"></canvas>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const statusEl = document.getElementById("status");

function status(t){ statusEl.textContent=t; }

function clear(){
    ctx.fillStyle="#000";
    ctx.fillRect(0,0,640,480);
}

function text(txt,x,y,color="#fff",size=18){
    ctx.fillStyle=color;
    ctx.font=size+"px Consolas";
    ctx.fillText(txt,x,y);
}

async function boot(){
    clear();
    status("Loading EXE...");

    try{
        const res = await fetch("https://tsb-web-port.vercel.app/game/TSB.exe");
        const buf = await res.arrayBuffer();

        scanImports(buf);

    }catch(e){
        console.error(e);
        status("Failed");
        clear();
        text("FAILED TO LOAD EXE",20,40,"#f55",28);
    }
}

function scanImports(buffer){
    clear();

    const dv = new DataView(buffer);

    status("Parsing imports...");

    let y = 30;

    text("TSB.exe loaded: " + buffer.byteLength + " bytes",20,y); y+=28;

    // basic PE checks
    const mz =
        String.fromCharCode(
            dv.getUint8(0),
            dv.getUint8(1)
        );

    if(mz !== "MZ"){
        text("Invalid EXE",20,y,"#f55");
        return;
    }

    const peOffset = dv.getUint32(0x3C,true);

    const pe =
        String.fromCharCode(
            dv.getUint8(peOffset),
            dv.getUint8(peOffset+1)
        );

    if(pe !== "PE"){
        text("Invalid PE Header",20,y,"#f55");
        return;
    }

    const sectionCount = dv.getUint16(peOffset+6,true);
    const optSize = dv.getUint16(peOffset+20,true);
    const optStart = peOffset + 24;
    const secStart = optStart + optSize;

    // Import Directory RVA
    const importRVA = dv.getUint32(optStart + 104,true);
    const importSize = dv.getUint32(optStart + 108,true);

    text("Import Table RVA: 0x" + importRVA.toString(16).toUpperCase(),20,y,"#7dff7d"); y+=26;
    text("Import Size: " + importSize,20,y,"#7dff7d"); y+=32;

    const sections = [];

    for(let i=0;i<sectionCount;i++){
        const off = secStart + i*40;

        let name="";
        for(let j=0;j<8;j++){
            const c = dv.getUint8(off+j);
            if(c!==0) name += String.fromCharCode(c);
        }

        sections.push({
            name,
            virtualSize: dv.getUint32(off+8,true),
            virtualAddress: dv.getUint32(off+12,true),
            rawSize: dv.getUint32(off+16,true),
            rawPtr: dv.getUint32(off+20,true)
        });
    }

    function rvaToOffset(rva){
        for(const s of sections){
            const start = s.virtualAddress;
            const end = start + Math.max(s.virtualSize,s.rawSize);

            if(rva >= start && rva < end){
                return s.rawPtr + (rva - start);
            }
        }
        return null;
    }

    const importOffset = rvaToOffset(importRVA);

    if(importOffset === null){
        text("Could not map import table.",20,y,"#f55");
        return;
    }

    text("Detected DLL Imports:",20,y,"#ffaa33"); y+=28;

    let desc = importOffset;
    let found = 0;

    while(true){
        const originalThunk = dv.getUint32(desc,true);
        const nameRVA = dv.getUint32(desc+12,true);
        const firstThunk = dv.getUint32(desc+16,true);

        if(originalThunk===0 && nameRVA===0 && firstThunk===0) break;

        const nameOff = rvaToOffset(nameRVA);

        if(nameOff !== null){
            let dllName="";
            let p = nameOff;

            while(true){
                const c = dv.getUint8(p++);
                if(c===0) break;
                dllName += String.fromCharCode(c);
            }

            text("- " + dllName,20,y,"#fff");
            y+=24;
            found++;

            if(y > 440){
                text("...more imports omitted...",20,y,"#888");
                break;
            }
        }

        desc += 20;
    }

    y+=18;
    text("DLL Count: " + found,20,y,"#7dff7d");

    status("Import scan complete");
}
</script>

</body>
</html>
